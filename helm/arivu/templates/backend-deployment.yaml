apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.instance.name }}-backend
  namespace: {{ .Values.instance.name }}
  labels:
    app: arivu-backend
    instance: {{ .Values.instance.subdomain }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: arivu-backend
      instance: {{ .Values.instance.subdomain }}
  template:
    metadata:
      labels:
        app: arivu-backend
        instance: {{ .Values.instance.subdomain }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.backend.env.port }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.backend.env.nodeEnv }}
        - name: PORT
          value: "{{ .Values.backend.env.port }}"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: {{ .Values.instance.name }}-mongodb-secret
              key: connection-string
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.instance.name }}-app-secret
              key: jwt-secret
        - name: JWT_EXPIRES_IN
          value: {{ .Values.backend.env.jwtExpiresIn }}
        - name: CLIENT_URL
          {{- if .Values.backend.env.clientUrl }}
          value: {{ .Values.backend.env.clientUrl | quote }}
          {{- else if and .Values.ingress.enabled (gt (len .Values.ingress.hosts) 0) }}
          value: {{ printf "https://%s" (index .Values.ingress.hosts 0).host | quote }}
          {{- else }}
          value: ""
          {{- end }}
        {{- if .Values.backend.env.mailboxOAuthSecret }}
        - name: MAILBOX_OAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.instance.name }}-app-secret
              key: mailbox-oauth-secret
        {{- end }}
        {{- if .Values.backend.gmail.clientId }}
        - name: GOOGLE_GMAIL_CLIENT_ID
          value: {{ .Values.backend.gmail.clientId | quote }}
        {{- end }}
        {{- if .Values.backend.gmail.clientSecret }}
        - name: GOOGLE_GMAIL_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.instance.name }}-app-secret
              key: gmail-client-secret
        {{- end }}
        {{- if .Values.backend.gmail.redirectUri }}
        - name: GOOGLE_GMAIL_REDIRECT_URI
          value: {{ .Values.backend.gmail.redirectUri | quote }}
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}

