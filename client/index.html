<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Arivu Systems | The mind of your business</title>
    <script>
      (function() {
        // 1. Check local storage for user preference
        const storedMode = localStorage.getItem('color-mode');
        let mode = storedMode || 'system';

        // 2. Determine if the 'dark' class should be present
        let prefersDark;
        if (mode === 'system') {
          prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        } else if (mode === 'dark') {
          prefersDark = true;
        } else {
          // If mode is 'light', prefersDark remains false
          prefersDark = false;
        }

        // 3. Apply the 'dark' class instantly if needed
        if (prefersDark) {
          document.documentElement.classList.add('dark');
        }
        // If it's light mode, the 'dark' class is *not* added, ensuring light mode styles apply.
      })();
    </script>
    <!-- Before the app CSS bundle loads, avoid a white viewport flash when <html> already has .dark -->
    <style>
      html.dark,
      html.dark body {
        background-color: #111827;
        color-scheme: dark;
      }
    </style>
    <link rel="icon" href="/assets/logo/Logo_light.svg" type="image/svg+xml" sizes="any">
    <link rel="manifest" href="/manifest.json">
    <!-- Tailwind CSS v4 processes styles dynamically -->


  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
